<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <!-- Matches PragatiMark's tile gradient (135°, same three stops) so the
         tab-bar favicon and the in-app logo read as the same mark. -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#1565C0"/>
      <stop offset="45%"  stop-color="#1769C8"/>
      <stop offset="100%" stop-color="#2B8C29"/>
    </linearGradient>
    <!-- Glossy top-left highlight, same as the in-app mark's inner ring. -->
    <linearGradient id="gloss" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.26"/>
      <stop offset="55%"  stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Diagonal squircle — matches PragatiMark exactly. TL/BR corners are
       rounder (0.38 × 64 ≈ 24px); TR/BL are tighter (0.20 × 64 ≈ 13px). The
       previous favicon used a uniform rounded square, which made the tab-bar
       icon read as a different mark from the in-app logo. -->
  <path
    d="M 24,0
       L 51,0
       A 13,13 0 0 1 64,13
       L 64,40
       A 24,24 0 0 1 40,64
       L 13,64
       A 13,13 0 0 1 0,51
       L 0,24
       A 24,24 0 0 1 24,0 Z"
    fill="url(#bg)"
  />
  <!-- Inner glossy overlay — inset 2.5px and corner radii scaled by 0.80 so
       the highlight follows the outer tile's shape (matching PragatiMark). -->
  <path
    d="M 21.7,2.5
       L 51,2.5
       A 10.4,10.4 0 0 1 61.5,12.9
       L 61.5,40.7
       A 21.7,21.7 0 0 1 39.8,62.5
       L 12.9,62.5
       A 10.4,10.4 0 0 1 2.5,52.1
       L 2.5,24.3
       A 21.7,21.7 0 0 1 24.3,2.5 Z"
    fill="url(#gloss)"
  />

  <!-- Two rising chevrons: progress / forward motion. Identical geometry to
       PragatiMark so the brand is consistent everywhere. -->
  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M14 40 L32 22 L50 40" stroke="#ffffff" stroke-width="7"/>
    <path d="M18 52 L32 38 L46 52" stroke="#B7E4C2" stroke-width="5" opacity="0.92"/>
  </g>
</svg>
