name: Production smoke test

# Continuously verifies the production deployment stays in its safe state:
#   • /api/health is 200 with a healthy Mongo ping
#   • /bootstrap and /api/admin/bootstrap are 404 (no open bootstrap)
#   • /api/auth/register is 403 (public registration disabled)
#   • /login renders
#
# Runs on a schedule and can be triggered manually. A failed run surfaces in
# the repo's Actions tab and (with default settings) emails the committers —
# investigate after two consecutive red runs.

on:
  schedule:
    - cron: '*/30 * * * *' # every 30 minutes
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Base URL to probe (defaults to the production deployment)'
        required: false
        default: 'https://pragatialm.vercel.app'

concurrency:
  group: smoke-prod
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Run production smoke checks
        run: npm run smoke-prod -- "${{ github.event.inputs.base_url || 'https://pragatialm.vercel.app' }}"
