name: Diagnose Next build

on:
  push:
    branches:
      - fix/vercel-build-pr133
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Capture TypeScript diagnostics
        run: npm run typecheck > typecheck.log 2>&1 || true
      - name: Upload TypeScript diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: typecheck-log
          path: typecheck.log
      - name: Typecheck
        run: npm run typecheck
      - name: Build
        run: npm run build
